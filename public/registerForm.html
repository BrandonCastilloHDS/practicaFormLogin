<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .primary-bg { background-color: #104385; }
        .primary-text { color: #104385; }
        .secondary-text { color: #0CDBEB; }
        .input-error { border-color: #ef4444 !important; background-color: #fef2f2; }
        .input-valid { border-color: #10b981 !important; }
        .focus-ring:focus { outline: none; border-color: #0CDBEB; box-shadow: 0 0 0 3px rgba(12, 219, 235, 0.2); }
        .transition-all { transition: all 0.3s ease; }
        .error-message { color: #ef4444; font-size: 0.75rem; margin-top: 0.25rem; font-weight: 500; display: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 border border-slate-100">
        <div class="flex justify-center mb-6">
            <div class="p-3 bg-slate-50 rounded-full">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 primary-text" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
                </svg>
            </div>
        </div>

        <h1 class="text-2xl font-bold text-center text-slate-800 mb-2">Crear cuenta</h1>
        <p class="text-slate-500 text-center mb-8 text-sm">Completa tus datos para registrarte</p>

        <form id="registerForm" class="space-y-4" novalidate>
            <div>
                <label for="username" class="block text-sm font-medium text-slate-700 mb-1">Nombre de usuario</label>
                <input type="text" id="username" class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus-ring transition-all text-slate-800" placeholder="Sin espacios (ej: HugoRojas)">
                <p id="usernameError" class="error-message">El usuario no debe contener espacios.</p>
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Correo Electrónico</label>
                <input type="email" id="email" class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus-ring transition-all text-slate-800" placeholder="correo@ejemplo.com">
                <p id="emailError" class="error-message">Debe ser una cuenta válida.</p>
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Contraseña</label>
                <input type="password" id="password" class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus-ring transition-all text-slate-800" placeholder="6-8 caracteres, 1 núm., 1 símbolo">
                <p id="passwordError" class="error-message">6-8 caracteres, incluir al menos un número y un símbolo.</p>
            </div>

            <div>
                <label for="confirmPassword" class="block text-sm font-medium text-slate-700 mb-1">Confirmar contraseña</label>
                <input type="password" id="confirmPassword" class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus-ring transition-all text-slate-800" placeholder="Repite tu contraseña">
                <p id="confirmError" class="error-message">Las contraseñas no coinciden.</p>
            </div>

            <button type="submit" id="submitBtn" class="w-full primary-bg text-white py-3 mt-4 rounded-lg font-semibold shadow-lg transition-all hover:brightness-110 active:scale-[0.98]">
                Registrarme
            </button>
        </form>

        <div class="mt-6 pt-6 border-t border-slate-100 text-center">
            <p class="text-sm text-slate-600">
                ¿Ya tienes cuenta? 
                <a href="index.html" class="font-semibold secondary-text hover:underline">Inicia sesión</a>
            </p>
        </div>
    </div>

    <div id="verificationModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/60 backdrop-blur-sm transition-all duration-300">
        <div class="w-full max-w-sm bg-white rounded-2xl shadow-2xl p-6 border border-slate-100 text-center">
            <div class="inline-flex p-3 bg-cyan-50 rounded-full mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 secondary-text" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 19v-8.93a2 2 0 01.89-1.664l8-4a2 2 0 011.78 0l8 4A2 2 0 0121 10.07V19M3 19a2 2 0 002 2h14a2 2 0 002-2M3 19l6.75-4.5M21 19l-6.75-4.5M3 10l6.75 4.5M21 10l-6.75 4.5m0 0l-1.14.76a2 2 0 01-2.22 0l-1.14-.76" />
                </svg>
            </div>
            <h2 class="text-xl font-bold text-slate-800 mb-2">Ingresa tu código</h2>
            <p class="text-slate-500 text-xs mb-6">Hemos enviado un código a tu correo.</p>

            <div class="mb-6 relative">
                <input type="text" id="verificationCode" maxlength="6" inputmode="numeric" pattern="[0-9]*" class="w-full text-center text-3xl font-mono font-bold tracking-[0.4em] pl-[0.4em] py-3 rounded-lg border border-slate-200 focus-ring text-slate-800" placeholder="000000" autocomplete="off">
            </div>

            <button type="button" id="verifyCodeBtn" class="w-full primary-bg text-white py-3 rounded-lg font-semibold shadow-lg transition-all opacity-50 cursor-not-allowed">
                Verificar código
            </button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('registerForm');
            const submitBtn = document.getElementById('submitBtn');
            const verificationModal = document.getElementById('verificationModal');
            const verifyCodeBtn = document.getElementById('verifyCodeBtn');
            const verificationCodeInput = document.getElementById('verificationCode');

            // --- Lógica de Validación Visual (Se mantiene intacta) ---
            const fields = {
                username: { el: document.getElementById('username'), error: document.getElementById('usernameError'), validate: (val) => val.length > 0 && !/\s/.test(val) },
                email: { el: document.getElementById('email'), error: document.getElementById('emailError'), validate: (val) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val) },
                password: {
                    el: document.getElementById('password'), error: document.getElementById('passwordError'),
                    validate: (val) => val.length >= 6 && val.length <= 8 && /\d/.test(val) && /[!@#$%^&*(),.?":{}|<>/]/.test(val)
                },
                confirmPassword: { el: document.getElementById('confirmPassword'), error: document.getElementById('confirmError'), validate: (val) => val === document.getElementById('password').value && val !== '' }
            };

            Object.keys(fields).forEach(key => {
                fields[key].el.addEventListener('input', () => {
                    const field = fields[key];
                    const isValid = field.validate(field.el.value);
                    if (field.el.value === "") {
                        field.el.classList.remove('input-error', 'input-valid'); field.error.style.display = 'none';
                    } else if (isValid) {
                        field.el.classList.remove('input-error'); field.el.classList.add('input-valid'); field.error.style.display = 'none';
                    } else {
                        field.el.classList.remove('input-valid'); field.el.classList.add('input-error'); field.error.style.display = 'block';
                    }
                });
            });

            // --- PASO 1: Enviar datos a Node para pedir el código ---
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                let isFormValid = true;

                Object.keys(fields).forEach(key => {
                    if (!fields[key].validate(fields[key].el.value)) {
                        fields[key].el.classList.add('input-error'); fields[key].error.style.display = 'block'; isFormValid = false;
                    }
                });

                if (isFormValid) {
                    submitBtn.textContent = 'Enviando correo...';
                    submitBtn.disabled = true;

                    try {
                        const response = await fetch('/api/solicitar-registro', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                nombre: fields.username.el.value,
                                email: fields.email.el.value,
                                password: fields.password.el.value
                            })
                        });

                        const result = await response.json();
                        
                        if (result.status === 'success') {
                            verificationModal.classList.remove('hidden');
                        } else {
                            alert("Error: " + result.message);
                        }
                    } catch (error) {
                        console.error("Error conectando al servidor:", error);
                    } finally {
                        submitBtn.textContent = 'Registrarme';
                        submitBtn.disabled = false;
                    }
                }
            });

            // --- Lógica del input de 6 dígitos ---
            verificationCodeInput.addEventListener('input', (e) => {
                e.target.value = e.target.value.replace(/\D/g, ''); // Solo números
                if (e.target.value.length === 6) {
                    verifyCodeBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    verifyCodeBtn.disabled = false;
                } else {
                    verifyCodeBtn.classList.add('opacity-50', 'cursor-not-allowed');
                    verifyCodeBtn.disabled = true;
                }
            });

            // --- PASO 2: Verificar el código con Node ---
            verifyCodeBtn.addEventListener('click', async () => {
                verifyCodeBtn.textContent = 'Verificando...';
                verifyCodeBtn.disabled = true;

                try {
                    const response = await fetch('/api/verificar-registro', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            codigoIngresado: verificationCodeInput.value })
                    });

                    const result = await response.json();

                    if (result.status === 'success') {
                        window.location.href = result.redirect;
                    } else {
                        alert("Atención: " + result.message); 
                        verifyCodeBtn.textContent = 'Verificar código';
                        verifyCodeBtn.disabled = false;
                    }
                } catch (error) {
                    console.error("Error:", error);
                }
            });
        });
    </script>
</body>
</html>

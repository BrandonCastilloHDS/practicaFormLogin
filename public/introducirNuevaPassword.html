<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Establecer Nueva Contraseña</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        
        .primary-bg { background-color: #104385; }
        .primary-text { color: #104385; }
        .secondary-text { color: #0CDBEB; }
        
        .input-error {
            border-color: #ef4444 !important;
            background-color: #fef2f2;
        }
        
        .input-valid {
            border-color: #10b981 !important;
            background-color: #f0fdf4;
        }
        
        .focus-ring:focus {
            outline: none;
            border-color: #0CDBEB;
            box-shadow: 0 0 0 3px rgba(12, 219, 235, 0.2);
        }
        
        .transition-all { transition: all 0.3s ease; }

        .error-message {
            color: #ef4444;
            font-size: 0.75rem;
            margin-top: 0.25rem;
            font-weight: 500;
            display: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 border border-slate-100">
        <!-- Icono de Seguridad Superior -->
        <div class="flex justify-center mb-6">
            <div class="p-3 bg-slate-50 rounded-full">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 primary-text" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
        </div>

        <h1 class="text-2xl font-bold text-center text-slate-800 mb-2">Restablecer contraseña</h1>
        <p class="text-slate-500 text-center mb-8 text-sm">Crea una nueva contraseña segura para tu cuenta</p>

        <!-- Formulario -->
        <form id="newPasswordForm" class="space-y-4" novalidate>
            <!-- Nueva Contraseña -->
            <div>
                <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Nueva contraseña</label>
                <input 
                    type="password" 
                    id="password" 
                    class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus-ring transition-all text-slate-800"
                    placeholder="6-8 caracteres, 1 número, 1 símbolo"
                >
                <p id="passwordError" class="error-message">Debe tener 6-8 caracteres e incluir al menos un número y un símbolo.</p>
            </div>

            <!-- Confirmación de Contraseña -->
            <div>
                <label for="confirmPassword" class="block text-sm font-medium text-slate-700 mb-1">Confirmar nueva contraseña</label>
                <input 
                    type="password" 
                    id="confirmPassword" 
                    class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus-ring transition-all text-slate-800"
                    placeholder="Repite tu nueva contraseña"
                >
                <p id="confirmError" class="error-message">Las contraseñas no coinciden.</p>
            </div>

            <button 
                type="submit" 
                class="w-full primary-bg text-white py-3 mt-4 rounded-lg font-semibold shadow-lg transition-all hover:brightness-110 active:scale-[0.98]"
            >
                Actualizar contraseña
            </button>
        </form>
    </div>

    <!-- Pantalla de Éxito y Redirección -->
    <div id="successOverlay" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/60 backdrop-blur-sm">
        <div class="w-full max-w-sm bg-white rounded-2xl shadow-2xl p-8 text-center border border-slate-100">
            <div class="inline-flex p-3 bg-emerald-50 rounded-full mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
            <h2 class="text-xl font-bold text-slate-800 mb-2">Contraseña restablecida</h2>
            <p class="text-slate-500 text-sm mb-4">Tu contraseña ha sido actualizada exitosamente.</p>
            
            <!-- Spinner indicador de redirección -->
            <div class="flex justify-center items-center space-x-2 text-xs text-slate-400">
                <svg class="animate-spin h-4 w-4 text-slate-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>Redirigiendo al inicio de sesión...</span>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('newPasswordForm');
            const successOverlay = document.getElementById('successOverlay');
            
            const fields = {
                password: {
                    el: document.getElementById('password'),
                    error: document.getElementById('passwordError'),
                    validate: (val) => {
                        const hasNumber = /\d/.test(val);
                        const hasSpecial = /[!@#$%^&*(),.?":{}|<>/]/.test(val);
                        return val.length >= 6 && val.length <= 8 && hasNumber && hasSpecial;
                    }
                },
                confirmPassword: {
                    el: document.getElementById('confirmPassword'),
                    error: document.getElementById('confirmError'),
                    validate: (val) => {
                        const originalPass = document.getElementById('password').value;
                        return val === originalPass && val !== '';
                    }
                }
            };

            Object.keys(fields).forEach(key => {
                const field = fields[key];
                
                field.el.addEventListener('input', () => {
                    const isValid = field.validate(field.el.value);
                    
                    if (field.el.value === "") {
                        field.el.classList.remove('input-error', 'input-valid');
                        field.error.style.display = 'none';
                    } else if (isValid) {
                        field.el.classList.remove('input-error');
                        field.el.classList.add('input-valid');
                        field.error.style.display = 'none';
                    } else {
                        field.el.classList.remove('input-valid');
                        field.el.classList.add('input-error');
                        field.error.style.display = 'block';
                    }

                    if (key === 'password' && fields.confirmPassword.el.value !== "") {
                        const isConfirmValid = fields.confirmPassword.validate(fields.confirmPassword.el.value);
                        if (isConfirmValid) {
                            fields.confirmPassword.el.classList.remove('input-error');
                            fields.confirmPassword.el.classList.add('input-valid');
                            fields.confirmPassword.error.style.display = 'none';
                        } else {
                            fields.confirmPassword.el.classList.remove('input-valid');
                            fields.confirmPassword.el.classList.add('input-error');
                            fields.confirmPassword.error.style.display = 'block';
                        }
                    }
                });
            });

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const nuevaPassword = document.getElementById('password').value;

                const response = await fetch('/api/cambiar-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nuevaPassword })
                });

                if ((await response.json()).status === 'success') {
                    successOverlay.classList.remove('hidden');
                    setTimeout(() => window.location.href = 'index.html', 2000);
                } else {
                    alert("Error al actualizar la contraseña");
                }
            });
        });
    </script>
</body>
</html>
